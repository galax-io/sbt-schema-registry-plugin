<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4a5568"/>
    </marker>
  </defs>

  <!-- edges (drawn first, behind boxes) -->
  <g stroke="#4a5568" stroke-width="1.5" fill="none" marker-end="url(#arrow)">
    <line x1="245" y1="72" x2="160" y2="148"/>
    <line x1="290" y1="72" x2="360" y2="148"/>
    <line x1="150" y1="202" x2="240" y2="278"/>
    <line x1="370" y1="202" x2="280" y2="278"/>
  </g>

  <!-- nodes -->
  <g stroke="#4a5568" stroke-width="1.5">
    <rect x="195" y="22"  width="130" height="50" rx="8" fill="#e8eef9"/>
    <rect x="80"  y="150" width="150" height="50" rx="8" fill="#f4f6f8"/>
    <rect x="300" y="150" width="150" height="50" rx="8" fill="#f4f6f8"/>
    <rect x="185" y="280" width="150" height="50" rx="8" fill="#eaf7ee"/>
  </g>

  <g fill="#1a202c" font-size="15" text-anchor="middle">
    <text x="260" y="52">order-value</text>
    <text x="155" y="180">customer-value</text>
    <text x="375" y="180">address-value</text>
    <text x="260" y="310">country-value</text>
  </g>

  <!-- "requested" / "shared" tags -->
  <g font-size="11" text-anchor="middle" fill="#5a6b7b">
    <text x="260" y="16">requested</text>
    <text x="260" y="345">shared — written once</text>
  </g>
</svg>
