<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 840" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1f"/>
      <stop offset="0.55" stop-color="#121a36"/>
      <stop offset="1" stop-color="#1c1547"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.28" r="0.6">
      <stop offset="0" stop-color="#6e8bff" stop-opacity="0.30"/>
      <stop offset="0.5" stop-color="#7c5cff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6ea8fe"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cdd7ff"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1600" height="840" fill="url(#bg)"/>
  <rect width="1600" height="840" fill="url(#glow)"/>
  <rect width="1600" height="6" fill="url(#accent)"/>

  <!-- orbit arcs (galaxio) + schema-reference node motif, top-right -->
  <g transform="translate(1270 285)" opacity="0.9">
    <ellipse rx="300" ry="120" fill="none" stroke="#6e8bff" stroke-opacity="0.12" stroke-width="1.5" transform="rotate(-22)"/>
    <ellipse rx="210" ry="86"  fill="none" stroke="#8b5cf6" stroke-opacity="0.16" stroke-width="1.5" transform="rotate(18)"/>
    <g stroke="#7f9cff" stroke-opacity="0.45" stroke-width="1.6">
      <line x1="0"   y1="-110" x2="-118" y2="35"/>
      <line x1="0"   y1="-110" x2="120"  y2="35"/>
      <line x1="-118" y1="35"  x2="-40"  y2="170"/>
      <line x1="120" y1="35"   x2="55"   y2="170"/>
      <line x1="-118" y1="35"  x2="55"   y2="170"/>
    </g>
    <g fill="#9db4ff">
      <circle cx="0"    cy="-110" r="9" fill="#a6f0c6"/>
      <circle cx="-118" cy="35"   r="8"/>
      <circle cx="120"  cy="35"   r="8"/>
      <circle cx="-40"  cy="170"  r="7"/>
      <circle cx="55"   cy="170"  r="7"/>
    </g>
  </g>

  <!-- eyebrow -->
  <text x="100" y="152" fill="#7fe3b0" font-size="24" font-weight="600" letter-spacing="4">GALAXIO · OPEN SOURCE</text>

  <!-- title -->
  <g fill="url(#title)" font-weight="800" font-size="74" letter-spacing="-1">
    <text x="98" y="285">We let an AI agent finish</text>
    <text x="98" y="375">the plugin we never wrote.</text>
  </g>

  <!-- subtitle -->
  <text x="100" y="452" fill="#aeb8d6" font-size="31" font-weight="400">Confluent Schema Registry → your sbt build.</text>
  <text x="100" y="494" fill="#aeb8d6" font-size="31" font-weight="400">Spec-driven. AI-assisted. Cross-built for sbt 2.x.</text>

  <!-- code pill -->
  <g>
    <rect x="100" y="585" width="980" height="74" rx="14" fill="#ffffff" fill-opacity="0.05" stroke="#5b6cff" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="128" y="631" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="25">
      <tspan fill="#34d399">addSbtPlugin</tspan><tspan fill="#cdd7ff">(</tspan><tspan fill="#e8b54a">"org.galaxio"</tspan><tspan fill="#cdd7ff"> % </tspan><tspan fill="#e8b54a">"sbt-schema-registry-plugin"</tspan><tspan fill="#cdd7ff">)</tspan>
    </text>
  </g>

  <!-- footer -->
  <text x="100" y="792" fill="#6b769a" font-size="23" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">github.com/galax-io/sbt-schema-registry-plugin</text>
</svg>
