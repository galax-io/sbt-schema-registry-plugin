name: Continuous Integration

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['main', 'release/**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SBT_OPTS: -Dsbt.color=true -Dsbt.log.noformat=false -Dsbt.supershell=false
  JAVA_OPTS: -Xms2G -Xmx2G -Xss4M -XX:+UseG1GC
  FORCE_COLOR: "1"
  TERM: xterm-256color

jobs:
  format:
    name: Check Formatting
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/sbt-setup
      - run: sbt scalafmtCheckAll scalafmtSbtCheck

  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/sbt-setup
      - name: Compile
        run: sbt compile
      - name: Test
        run: sbt test

  it-test:
    name: Integration Test
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/sbt-setup
      - name: Integration Test
        run: sbt it/test

  scripted:
    name: Scripted (plugin e2e)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      # Testcontainers boots from sbt's meta-build classloader, where strategy
      # ServiceLoader discovery finds no socket strategy. Point it at the daemon
      # explicitly via the env strategy (which needs no ServiceLoader).
      DOCKER_HOST: unix:///var/run/docker.sock
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/sbt-setup
      - name: Scripted tests
        # Some tests assert expected failures (-> prefix in sbt scripted).
        # [error] lines in the log from download-failure, hook-compile, and
        # hook-source-generators are intentional — they prove the plugin
        # correctly fails the build when the registry is unreachable.
        run: sbt scripted
